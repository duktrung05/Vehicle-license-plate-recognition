version: "3.9"

services:

  # ─── FastAPI Backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    container_name: lpr_backend
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./outputs:/app/outputs
      - ./database:/app/database
      - ./data:/app/data
    environment:
      - PYTHONPATH=/app:/app/src
      - LOG_LEVEL=info
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Streamlit Frontend ──────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
    container_name: lpr_frontend
    ports:
      - "8501:8501"
    volumes:
      - ./models:/app/models
      - ./outputs:/app/outputs
      - ./database:/app/database
    environment:
      - PYTHONPATH=/app:/app/src
      - API_URL=http://backend:8000
    command: streamlit run frontend/streamlit_app.py --server.port=8501 --server.address=0.0.0.0
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  lpr_database:
  lpr_outputs:

networks:
  default:
    name: lpr_network
